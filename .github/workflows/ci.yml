name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        shell: pwsh
        run: |
          git init .
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git -c http.extraheader="AUTHORIZATION: bearer $env:GITHUB_TOKEN" fetch --depth=1 origin "$env:GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Show runtime versions
        shell: pwsh
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Compile Electron entrypoints
        run: npm run electron:compile
