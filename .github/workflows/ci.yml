name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show runtime versions
        shell: pwsh
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Compile Electron entrypoints
        run: npm run electron:compile
